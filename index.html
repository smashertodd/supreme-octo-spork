<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix the Paragraph</title>
    <style>
        /* DARK MODE NEON / SUNRISE AESTHETIC */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 3em;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(to right, #f9a8d4, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            text-shadow: 0 0 30px rgba(249, 168, 212, 0.3);
        }

        .glass-panel {
            background: rgba(30, 27, 75, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #f9a8d4;
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 1400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
        }

        /* Layout */
        #game-container { display: none; width: 100%; }
        .game-layout {
            display: flex;
            gap: 30px;
            margin-top: 20px;
        }
        .left-panel { flex: 0 0 300px; }
        .right-panel { flex: 1; }

        /* Inputs & Buttons */
        input[type="text"], select {
            width: 100%;
            padding: 15px;
            margin: 10px 0 20px;
            border: 2px solid rgba(165, 180, 252, 0.3);
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.6);
            color: white;
            font-size: 1.1em;
            box-sizing: border-box;
        }
        
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #f9a8d4;
            box-shadow: 0 0 15px rgba(249, 168, 212, 0.3);
        }

        .start-btn, .check-btn {
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            font-weight: bold;
            color: #1e1b4b;
            background: linear-gradient(135deg, #f9a8d4, #a5b4fc);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .start-btn:hover, .check-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(249, 168, 212, 0.4);
        }

        /* Draggable Chips */
        .draggable-chip {
            padding: 12px 20px;
            margin-bottom: 12px;
            color: #1e1b4b;
            font-weight: bold;
            font-size: 1.1em;
            border-radius: 8px !important; /* Soft rounded rectangle */
            cursor: grab;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s;
            display: inline-flex;
            align-items: center;
        }
        .draggable-chip:hover {
            transform: scale(1.05);
        }

        /* Standard Gap Fill Layout (Inline text) */
        .standard-gap-fill-layout {
            line-height: 2.8;
            font-size: 1.25em;
            background: rgba(15, 23, 42, 0.4);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .gap-text-part {
            display: inline;
        }
        .gap-fill-dropzone {
            display: inline-flex;
            min-width: 140px;
            min-height: 40px;
            margin: 0 8px;
            vertical-align: middle;
            border: 2px dashed rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .gap-fill-dropzone .draggable-chip {
            margin: 0;
            box-shadow: none;
        }

        /* Categorisation Layout (Block layout) */
        .categorisation-layout {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .categorisation-row {
            display: flex;
            align-items: stretch;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
        }
        .dropzone-container {
            flex: 0 0 250px;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .dropzone {
            width: 100%;
            min-height: 60px;
            border: 2px dashed rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .text-content {
            flex: 1;
            padding: 20px;
            font-size: 1.25em;
            line-height: 1.6;
            display: flex;
            align-items: center;
        }
        .dropzone .draggable-chip {
            margin: 0;
            width: 100%;
            height: 100%;
            justify-content: center;
            box-sizing: border-box;
        }

        /* THE LOVELY NEON TEACHER TOGGLE */
        .top-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
        }
        .teacher-toggle {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }
        .teacher-toggle input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.1);
            transition: .4s;
            border-radius: 34px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 3px;
            background-color: #a5b4fc;
            transition: .4s;
            border-radius: 50%;
            box-shadow: 0 0 10px #a5b4fc;
        }
        input:checked + .slider {
            background-color: rgba(249, 168, 212, 0.3);
            border-color: #f9a8d4;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
            background-color: #f9a8d4;
            box-shadow: 0 0 10px #f9a8d4;
        }

        /* Teacher Data Table */
        #teacher-view { display: none; width: 100%; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 12px;
            overflow: hidden;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        th {
            background: rgba(0, 0, 0, 0.3);
            color: #f9a8d4;
            font-weight: bold;
        }

        .confetti {
            position: fixed;
            top: -10px;
            width: 10px;
            height: 10px;
            background-color: #f9a8d4;
            animation: fall linear forwards;
            z-index: 9999;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }

        #feedback-message {
            margin-top: 20px;
            font-size: 1.2em;
            font-weight: bold;
            text-align: center;
            padding: 15px;
            border-radius: 8px;
        }
        .success { background: rgba(74, 222, 128, 0.2); color: #4ade80; border: 1px solid #4ade80; }
        .error { background: rgba(248, 113, 113, 0.2); color: #f87171; border: 1px solid #f87171; }
        
        #activity-subtitle {
            color: #a5b4fc;
            font-size: 1.2em;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <!-- Teacher Toggle in Top Right -->
    <div class="top-controls">
        <label class="teacher-toggle">
            <input type="checkbox" id="roleSwitch" onchange="toggleRole()">
            <span class="slider"></span>
        </label>
        <span style="color: #a5b4fc; font-weight: bold; margin-left: 10px; font-size: 1.1em; text-shadow: 0 0 5px rgba(165, 180, 252, 0.5);">Teacher View</span>
    </div>

    <h1>Fix the Paragraph</h1>

    <!-- STUDENT LOGIN -->
    <div id="student-login" class="glass-panel" style="max-width: 600px; text-align: center;">
        <h2 style="margin-top: 0;">Student Sign In</h2>
        <input type="text" id="student-name" placeholder="Enter your first name">
        <select id="activity-select">
            <option value="">Loading activities...</option>
        </select>
        <button class="start-btn" onclick="startActivity()">Start Activity</button>
    </div>

    <!-- TEACHER VIEW -->
    <div id="teacher-view" class="glass-panel">
        <h2 style="margin-top: 0; color: #f9a8d4;">Live Teacher Dashboard</h2>
        <p style="color: #94a3b8;">Data refreshes automatically every 15 seconds.</p>
        <div id="teacher-data">Loading tracking data...</div>
    </div>

    <!-- GAME CONTAINER -->
    <div id="game-container" class="glass-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 20px;">
            <div>
                <h2 id="activity-title" style="margin: 0; color: #f9a8d4;"></h2>
                <div id="activity-subtitle"></div>
            </div>
            <button onclick="resetGame()" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: 0.2s;">Exit</button>
        </div>

        <div class="game-layout">
            <!-- CHOICES (LEFT) -->
            <div class="left-panel">
                <div style="background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px; min-height: 300px; border: 1px solid rgba(255,255,255,0.05);" id="choices-container">
                    <!-- Draggable chips go here -->
                </div>
            </div>

            <!-- TEXT / GAPS (RIGHT) -->
            <div class="right-panel">
                <div id="text-container">
                    <!-- Text and dropzones will be injected here by app.js -->
                </div>
                
                <div style="margin-top: 30px; display: flex; gap: 15px;">
                    <button class="check-btn" onclick="checkAnswer()">CHECK ANSWER</button>
                </div>
                <div id="feedback-message"></div>
            </div>
        </div>
    </div>

    <!-- THE CRITICAL CACHE BUSTER (Notice it says v=45 now!) -->
    <script src="app.js?v=80"></script>
</body>
</html>
