<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Arcade</title>
    
    <!-- CRITICAL: These toolboxes make the beautiful styling and popups work! -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        /* The Breathing Dark Neon Background */
        body {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #e2e8f0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* Wide Screen Layout */
        .main-container { max-width: 95vw; margin: 0 auto; padding: 20px; width: 100%; }
        .workspace-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; height: 75vh; }
        .panel-scroll { overflow-y: auto; overflow-x: hidden; padding-right: 15px; height: 100%; }

        /* Neon Scrollbars */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #f9a8d4, #a5b4fc); border-radius: 10px; }

        /* Beautiful Text Gradient */
        .text-gradient { background: linear-gradient(to right, #f9a8d4, #a5b4fc, #86efac); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* HARD-CODED: Soft Rectangles, NEVER Circles (unless inside a paragraph gap) */
        .draggable-chip {
            border-radius: 12px !important; 
            min-height: 50px;
            padding: 10px 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: all 0.2s ease;
        }
        .draggable-chip:hover {
            transform: translateY(-4px) scale(1.02) !important;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4), inset 0 0 10px rgba(255,255,255,0.3) !important;
            z-index: 50;
        }
    </style>
</head>
<body>
    <!-- The Lovely Neon Toggle (Top Right) -->
    <div class="absolute top-6 right-8 z-50">
        <button id="btn-teacher-toggle" class="bg-[#0f172a]/80 border border-pink-500/50 text-pink-300 px-6 py-2.5 rounded-full font-bold backdrop-blur-md shadow-[0_0_15px_rgba(236,72,153,0.3)] hover:shadow-[0_0_25px_rgba(236,72,153,0.6)] hover:text-white hover:-translate-y-1 transition-all">Teacher Login 🔐</button>
    </div>

    <div class="main-container">
        <!-- Title Header -->
        <div class="text-center mb-8">
            <h1 class="text-5xl font-extrabold text-gradient tracking-wider drop-shadow-lg mb-2">Activity Arcade</h1>
            <p class="text-pink-300 text-lg">Master your writing skills</p>
        </div>

        <!-- LOGIN SCREEN -->
        <div id="login-screen" class="max-w-md mx-auto bg-white/10 backdrop-blur-md p-8 rounded-3xl shadow-[0_25px_50px_-12px_rgba(0,0,0,0.6)] border border-white/20 text-center mt-20">
            <h2 class="text-3xl text-white font-bold mb-6">Welcome!</h2>
            <input type="text" id="student-name" placeholder="Enter your name..." class="w-full p-4 text-xl rounded-xl bg-black/40 border border-pink-400/50 text-white placeholder-gray-400 focus:outline-none focus:border-pink-400 focus:ring-2 focus:ring-pink-400 mb-6 text-center shadow-inner">
            <button id="start-btn" class="w-full py-4 text-xl font-bold bg-gradient-to-r from-pink-500 to-purple-500 hover:from-pink-400 hover:to-purple-400 text-white rounded-xl shadow-[0_0_20px_rgba(236,72,153,0.5)] hover:shadow-[0_0_30px_rgba(236,72,153,0.8)] transition-all transform hover:-translate-y-1">Start Playing 🚀</button>
        </div>

        <!-- LOADING SCREEN -->
        <div id="loading-screen" class="hidden max-w-md mx-auto text-center mt-20">
            <div class="w-16 h-16 border-4 border-pink-500 border-t-transparent rounded-full animate-spin mx-auto mb-4 shadow-[0_0_15px_rgba(236,72,153,0.5)]"></div>
            <h2 class="text-2xl text-pink-300 font-bold animate-pulse">Loading amazing activities...</h2>
        </div>

        <!-- APP WORKSPACE -->
        <div id="app-workspace" class="hidden">
            <div class="bg-white/10 backdrop-blur-md rounded-3xl border border-white/20 p-6 shadow-[0_25px_50px_-12px_rgba(0,0,0,0.6)]">
                <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
                    <h2 id="activity-title" class="text-3xl font-bold text-white tracking-wide drop-shadow-md">Loading...</h2>
                    <button id="overall-hint-btn" class="hidden bg-yellow-500/20 text-yellow-300 border border-yellow-500/50 px-5 py-2 rounded-full hover:bg-yellow-500/40 transition-colors font-bold shadow-[0_0_10px_rgba(234,179,8,0.3)]">💡 Overall Hint</button>
                </div>

                <div class="workspace-grid">
                    <!-- LEFT PANEL -->
                    <div class="panel-scroll bg-black/30 rounded-2xl p-5 border border-white/5 shadow-inner relative">
                        <h3 class="text-xl text-pink-300 font-bold mb-4 text-center sticky top-0 bg-[#1e1b4b]/90 backdrop-blur-sm py-3 rounded-lg z-10 shadow-md">Drag from here</h3>
                        <div id="left-panel" class="flex flex-col gap-3 min-h-[50%]"></div>
                    </div>

                    <!-- RIGHT PANEL -->
                    <div class="panel-scroll bg-black/30 rounded-2xl p-5 border border-white/5 shadow-inner relative">
                        <h3 class="text-xl text-blue-300 font-bold mb-4 text-center sticky top-0 bg-[#1e1b4b]/90 backdrop-blur-sm py-3 rounded-lg z-10 shadow-md">Drop here</h3>
                        <div id="right-panel" class="flex flex-col gap-4 h-full"></div>
                    </div>
                </div>

                <div class="mt-8 text-center">
                    <button id="check-btn" class="px-12 py-4 text-2xl font-bold bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white rounded-xl shadow-[0_0_20px_rgba(34,197,94,0.4)] hover:shadow-[0_0_30px_rgba(34,197,94,0.7)] transition-all transform hover:-translate-y-1 tracking-wide">CHECK ANSWER ✅</button>
                </div>
            </div>
        </div>

        <!-- TEACHER DASHBOARD -->
        <div id="teacher-dashboard" class="hidden bg-white/10 backdrop-blur-md rounded-3xl border border-white/20 p-8 shadow-[0_25px_50px_-12px_rgba(0,0,0,0.6)]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-bold text-white text-gradient">Teacher Dashboard 📊</h2>
                <div class="flex gap-4">
                    <a href="https://docs.google.com/spreadsheets/d/1iZQd9GEMfcs-uY9rzRHIf4LMMoGe7qpcAOfbOdxQi9c/edit" target="_blank" class="bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white px-6 py-3 rounded-xl font-bold shadow-lg transition-all transform hover:-translate-y-1">Edit Google Sheet</a>
                    <button id="refresh-data-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-xl font-bold shadow-lg transition-all transform hover:-translate-y-1">Refresh Data</button>
                </div>
            </div>
            <div class="overflow-x-auto bg-black/40 rounded-xl border border-white/10 shadow-inner max-h-[60vh] overflow-y-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-white/10 border-b border-white/20 text-pink-300 sticky top-0 backdrop-blur-md">
                        <tr>
                            <th class="p-4">Time</th>
                            <th class="p-4">Student</th>
                            <th class="p-4">Activity</th>
                            <th class="p-4 text-center">Attempt</th>
                            <th class="p-4">Status</th>
                            <th class="p-4">Details</th>
                        </tr>
                    </thead>
                    <tbody id="tracking-data">
                        <tr><td colspan="6" class="p-8 text-center text-gray-400 font-bold">Loading live data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Bumped to v=50 to bypass all cache -->
    <script src="app.js?v=50"></script>
</body>
</html>
