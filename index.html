<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            color: #e0e7ff;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .glass-panel {
            background: rgba(17, 24, 39, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-top: 1px solid rgba(236, 72, 153, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border-radius: 1rem;
        }
        .neon-text {
            background: linear-gradient(to right, #f472b6, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(244, 114, 182, 0.3);
        }
        
        /* Forces chips to be soft rectangles, NEVER circles */
        .draggable-chip {
            border-radius: 0.5rem !important; 
            cursor: grab;
            transition: transform 0.1s, box-shadow 0.1s;
            font-weight: 600;
            color: #111827 !important; /* Dark text on pastel */
            padding: 0.5rem 1rem;
            display: inline-block;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin: 0.25rem;
        }
        .draggable-chip:active {
            cursor: grabbing;
            transform: scale(0.95);
        }
        
        .drop-slot {
            display: inline-block;
            min-width: 120px;
            height: 40px;
            border: 2px dashed rgba(99, 102, 241, 0.5);
            border-radius: 0.5rem;
            vertical-align: middle;
            margin: 0 0.5rem;
            transition: all 0.2s;
        }
        .drop-slot.drag-over {
            background-color: rgba(99, 102, 241, 0.2);
            border-color: #f472b6;
        }
        .hidden-section {
            display: none !important;
        }
    </style>
</head>
<body class="p-6 relative">

    <!-- The Lovely Neon Toggle (Top Right) -->
    <div class="absolute top-6 right-6 flex items-center space-x-3 z-50">
        <span class="text-pink-300 font-semibold text-sm tracking-wide uppercase drop-shadow-md">Teacher View</span>
        <label class="relative inline-flex items-center cursor-pointer" title="Toggle Teacher Mode">
            <input type="checkbox" id="teacher-toggle" class="sr-only peer">
            <div class="w-14 h-7 bg-indigo-950/80 peer-focus:outline-none rounded-full peer 
                        peer-checked:after:translate-x-full peer-checked:after:border-white 
                        after:content-[''] after:absolute after:top-[2px] after:left-[2px] 
                        after:bg-white after:border-gray-300 after:border after:rounded-full 
                        after:h-6 after:w-6 after:transition-all 
                        peer-checked:bg-gradient-to-r peer-checked:from-pink-500 peer-checked:to-blue-500 
                        shadow-[0_0_15px_rgba(236,72,153,0.3)] border border-indigo-500/30"></div>
        </label>
    </div>

    <!-- Massive 90% wide container to fill the screen -->
    <div id="app" class="max-w-[90%] mx-auto relative mt-8">
        
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-6xl font-extrabold neon-text tracking-tight mb-3">Interactive Learning</h1>
            <p class="text-indigo-200 text-lg">Complete the activities below</p>
        </div>

        <!-- Loading / Error States -->
        <div id="loading" class="text-center text-xl text-pink-300 animate-pulse py-10 glass-panel">
            Connecting to Library...
        </div>
        <div id="error-message" class="hidden-section bg-red-900/50 border border-red-500 text-red-200 p-4 rounded-lg mb-6 text-center"></div>

        <!-- 1. Sign In Screen (Students ONLY, No ugly links) -->
        <div id="sign-in-screen" class="hidden-section max-w-md mx-auto glass-panel p-8">
            <h2 class="text-2xl font-bold text-white mb-6 text-center">Student Sign In</h2>
            <div class="space-y-5">
                <div>
                    <label class="block text-indigo-200 mb-2 font-medium">Your Name:</label>
                    <input type="text" id="student-name" class="w-full p-3 rounded-lg bg-indigo-950/50 border border-indigo-400/30 text-white placeholder-indigo-300/50 focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 transition-all" placeholder="e.g., John Smith">
                </div>
                <div>
                    <label class="block text-indigo-200 mb-2 font-medium">Select Activity:</label>
                    <select id="activity-selector" class="w-full p-3 rounded-lg bg-indigo-950/50 border border-indigo-400/30 text-white focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 transition-all">
                        <option value="">-- Choose an activity --</option>
                    </select>
                </div>
                <button id="start-btn" class="w-full py-3 px-4 bg-gradient-to-r from-pink-500 to-blue-600 hover:from-pink-400 hover:to-blue-500 text-white font-bold rounded-lg shadow-lg transform transition hover:-translate-y-0.5">
                    Start Activity
                </button>
            </div>
        </div>

        <!-- 2. Student Game Area -->
        <div id="game-area" class="hidden-section glass-panel p-8 min-h-[50vh]">
            <div class="flex justify-between items-center mb-6 border-b border-indigo-500/30 pb-4">
                <div>
                    <h2 id="activity-title" class="text-4xl font-bold text-white"></h2>
                    <p id="student-display-name" class="text-indigo-300 mt-2 text-lg"></p>
                </div>
                <button id="logout-btn" class="px-5 py-2 bg-indigo-800/50 hover:bg-indigo-700/50 text-indigo-200 rounded-lg transition-colors border border-indigo-500/30 font-semibold">
                    Sign Out
                </button>
            </div>
            
            <div class="flex justify-between items-center mb-6">
                <p id="overall-hint" class="text-pink-300 italic hidden text-lg"></p>
                <button id="show-hint-btn" class="px-4 py-2 bg-indigo-800/50 hover:bg-indigo-700/50 text-indigo-200 rounded-lg transition-colors text-sm border border-indigo-500/30 hidden">
                    Show Hint
                </button>
            </div>

            <!-- Activity content populates here -->
            <div id="activity-container" class="mb-8 text-xl leading-loose"></div>

            <div class="mt-10 flex justify-between items-center">
                <div id="feedback" class="text-xl font-bold"></div>
                <button id="check-btn" class="px-10 py-4 text-lg bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white font-bold rounded-lg shadow-lg transform transition hover:-translate-y-0.5">
                    Check Answer
                </button>
            </div>
        </div>

        <!-- 3. Teacher Dashboard -->
        <div id="teacher-dashboard" class="hidden-section glass-panel p-8 min-h-[60vh]">
            <div class="flex justify-between items-center mb-6 border-b border-indigo-500/30 pb-4">
                <h2 class="text-3xl font-bold text-white">Teacher Dashboard</h2>
                <div id="teacher-auth" class="flex space-x-3">
                    <input type="password" id="teacher-pin" class="p-2 rounded-lg bg-indigo-950/50 border border-indigo-400/30 text-white" placeholder="Enter PIN">
                    <button id="teacher-login-btn" class="px-5 py-2 bg-pink-600 hover:bg-pink-500 text-white rounded-lg transition-colors font-bold">Unlock</button>
                </div>
                <div id="teacher-controls" class="hidden space-x-3">
                    <button id="refresh-data-btn" class="px-5 py-2 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg transition-colors">Refresh Data</button>
                </div>
            </div>

            <div id="teacher-content" class="hidden">
                <div class="overflow-x-auto rounded-lg border border-indigo-500/30">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-indigo-950/80">
                            <tr class="border-b border-indigo-500/50 text-pink-300">
                                <th class="p-4 font-semibold">Time</th>
                                <th class="p-4 font-semibold">Student</th>
                                <th class="p-4 font-semibold">Activity</th>
                                <th class="p-4 font-semibold">Attempt</th>
                                <th class="p-4 font-semibold">Status</th>
                                <th class="p-4 font-semibold">Details</th>
                            </tr>
                        </thead>
                        <tbody id="tracking-data-body" class="divide-y divide-indigo-500/20">
                            <!-- Data -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <!-- Bumped to v=42 to completely bypass cache -->
    <script src="app.js?v=42"></script>
</body>
</html>
