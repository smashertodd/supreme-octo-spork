<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Arcade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            /* The deep dark-mode sunrise background */
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4c1d95 100%);
            color: white;
            min-height: 100vh;
            margin: 0;
        }
        /* Pink-to-blue title gradient */
        .neon-text {
            background: linear-gradient(to right, #f472b6, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(244, 114, 182, 0.3);
        }
        /* Wide glass panels with the neon pink line on top */
        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid #f472b6;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .neon-button {
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            transition: all 0.3s ease;
        }
        .neon-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.5);
        }
        /* Lovely neon toggle for Teacher Login */
        .teacher-toggle {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }
        .teacher-toggle:hover {
            background: rgba(236, 72, 153, 0.2);
            border-color: #ec4899;
            box-shadow: 0 0 10px rgba(236, 72, 153, 0.5);
        }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center">

    <!-- Header (Fills Screen Width) -->
    <div class="w-full max-w-[95%] flex justify-between items-center mb-8 relative">
        <div class="w-32"></div> <!-- Spacer to keep title perfectly centered -->
        <h1 class="text-5xl md:text-6xl font-extrabold text-center neon-text tracking-wider">Activity Arcade</h1>
        <!-- Teacher Login Toggle (No Padlock) -->
        <button id="teacher-login-btn" class="teacher-toggle px-6 py-2 rounded-full text-sm font-bold text-pink-300 w-32">Teacher Login</button>
    </div>

    <!-- 1. Login Screen -->
    <div id="login-screen" class="glass-panel w-full max-w-[95%] rounded-2xl p-8 mb-8">
        <p class="text-gray-300 mb-4 text-lg">Enter your name to get started.</p>
        <input type="text" id="student-name" placeholder="Your Name" class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:border-pink-500 mb-6 text-lg">
        <button id="start-btn" class="neon-button text-white font-bold py-3 px-8 rounded-xl text-lg w-full md:w-auto">Start</button>
    </div>

    <!-- 2. Loading Screen -->
    <div id="loading-screen" class="hidden flex flex-col justify-center items-center h-64 w-full">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-pink-500 mb-4"></div>
        <h2 class="text-2xl text-pink-300 font-bold animate-pulse">Loading Activities...</h2>
    </div>

    <!-- 3. Main Game App -->
    <div id="app" class="hidden w-full max-w-[95%] flex flex-col">
        <div class="flex justify-between items-center mb-6">
            <h2 id="activity-title" class="text-3xl font-bold text-white tracking-wide"></h2>
            <button id="overall-hint-btn" class="hidden neon-button text-white px-6 py-2 rounded-xl font-bold">💡 Overall Hint</button>
        </div>
        
        <div class="flex flex-col md:flex-row gap-6 h-[600px]">
            <!-- Left Panel (Draggables) -->
            <div id="left-panel" class="w-full md:w-1/3 glass-panel rounded-2xl p-6 overflow-y-auto"></div>
            <!-- Right Panel (Structure/Text) -->
            <div id="right-panel" class="w-full md:w-2/3 glass-panel rounded-2xl p-6 overflow-y-auto"></div>
        </div>

        <div class="mt-8 text-center">
            <button id="check-btn" class="neon-button text-white text-2xl font-bold py-4 px-12 rounded-2xl w-full md:w-auto shadow-lg shadow-pink-500/30">CHECK ANSWER</button>
        </div>
    </div>

    <!-- 4. Teacher Dashboard -->
    <div id="teacher-dashboard" class="hidden w-full max-w-[95%] glass-panel rounded-2xl p-8">
        <h2 class="text-3xl font-bold text-pink-400 mb-6 flex items-center gap-3">👩‍🏫 Teacher Dashboard</h2>
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-white/10 text-pink-300 border-b border-white/20">
                        <th class="p-4 rounded-tl-xl font-bold">Time</th>
                        <th class="p-4 font-bold">Student</th>
                        <th class="p-4 font-bold">Activity</th>
                        <th class="p-4 text-center font-bold">Attempt</th>
                        <th class="p-4 font-bold">Status</th>
                        <th class="p-4 rounded-tr-xl font-bold">Details</th>
                    </tr>
                </thead>
                <tbody id="tracking-data"></tbody>
            </table>
        </div>
    </div>

    <script src="app.js?v=91"></script>
</body>
</html>
