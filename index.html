<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }
        #app {
            width: 100%;
            max-width: 1400px; /* Forces a nice wide, screen-filling layout */
            position: relative;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <!-- The v=40 forces the browser to load our newest changes instantly -->
    <script src="app.js?v=40"></script> 
</body>
</html>
