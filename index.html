<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity Arcade</title>
  <link rel="stylesheet" href="style.css?v=4">
  <!-- CONFETTI SCRIPT -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    /* WIDE LAYOUT FIX - "Whole screen filled" */
    #app { max-width: 95vw !important; width: 100% !important; margin: 0 auto; padding: 20px; }
    .workspace { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
    .panel-left, .panel-right { max-height: 75vh !important; overflow-y: auto; overflow-x: hidden; padding-right: 15px; }
    /* THE 'Y' FIX */
    h1#app-title { padding-bottom: 15px; }
    /* Beautiful Neon Scrollbar Styling */
    .panel-left::-webkit-scrollbar, .panel-right::-webkit-scrollbar { width: 8px; }
    .panel-left::-webkit-scrollbar-track, .panel-right::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
    .panel-left::-webkit-scrollbar-thumb, .panel-right::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #f9a8d4, #a5b4fc); border-radius: 10px; }
    .panel-left::-webkit-scrollbar-thumb:hover, .panel-right::-webkit-scrollbar-thumb:hover { background: linear-gradient(135deg, #fca5a5, #d8b4fe); }
    /* 1. TACTILE HOVER GLOW FOR CHIPS */
    .draggable-chip { transition: all 0.2s ease-in-out !important; }
    .draggable-chip:hover { transform: translateY(-4px) scale(1.03) !important; box-shadow: 0 10px 20px rgba(255, 255, 255, 0.3), inset 0 0 8px rgba(255, 255, 255, 0.5) !important; cursor: grab !important; z-index: 100 !important; }
    .draggable-chip:active { transform: translateY(2px) scale(0.98) !important; box-shadow: 0 2px 5px rgba(255, 255, 255, 0.1) !important; cursor: grabbing !important; }
    /* 2. BREATHING BACKGROUND ANIMATION */
    body { background-size: 200% 200% !important; animation: breathingGradient 20s ease infinite !important; }
    @keyframes breathingGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    /* 3. FROSTED GLASS DEPTH */
    #student-login, #game-container, #teacher-view, .card {
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.2) !important;
        border: 1px solid rgba(255, 255, 255, 0.15) !important;
        border-radius: 16px !important;
        background: rgba(30, 30, 46, 0.6) !important; /* Ensuring dark glass look */
        backdrop-filter: blur(10px);
    }
    /* NEON TOGGLE CORNER BUTTONS */
    .neon-toggle-container { position: absolute; top: 25px; right: 30px; z-index: 1000; }
    .neon-toggle {
        background: rgba(15, 23, 42, 0.7); border: 1px solid rgba(236, 72, 153, 0.4);
        color: #f9a8d4; padding: 10px 20px; border-radius: 30px; cursor: pointer;
        font-weight: 700; font-size: 0.95rem; backdrop-filter: blur(10px);
        box-shadow: 0 0 15px rgba(236, 72, 153, 0.2); transition: all 0.3s ease;
    }
    .neon-toggle:hover {
        box-shadow: 0 0 25px rgba(236, 72, 153, 0.6), inset 0 0 10px rgba(236, 72, 153, 0.4);
        border-color: #ec4899; color: #fff; transform: translateY(-2px);
    }
    /* Magic logic: only show the button for the mode we are NOT in! */
    #tab-student.active, #tab-teacher.active { display: none !important; }
    #tab-student:not(.active), #tab-teacher:not(.active) { display: inline-block !important; }
    /* NEON PIN MODAL */
    #pin-modal {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px);
        z-index: 9999; display: flex; align-items: center; justify-content: center;
    }
    #pin-modal.hidden { display: none !important; }
    #pin-modal-box {
        background: rgba(30, 30, 46, 0.95); border: 2px solid #a5b4fc;
        box-shadow: 0 0 40px rgba(165, 180, 252, 0.4), inset 0 0 15px rgba(165, 180, 252, 0.2);
        border-radius: 24px; padding: 40px; width: 90%; max-width: 420px; text-align: center; color: #e2e8f0;
    }
    #pin-modal-box h3 { color: #c4b5fd; font-size: 2rem; margin-top: 0; margin-bottom: 10px; text-shadow: 0 0 15px rgba(196, 181, 253, 0.5); font-family: sans-serif; }
    #pin-modal-box p { color: #94a3b8; margin-bottom: 25px; font-size: 1.1rem; }
    #pin-input {
        width: 100%; padding: 15px; font-size: 2rem; text-align: center; letter-spacing: 15px;
        background: rgba(15, 23, 42, 0.5); border: 2px solid #6366f1; border-radius: 12px; color: #fff;
        margin-bottom: 25px; outline: none; transition: all 0.3s; box-sizing: border-box; font-family: monospace;
    }
    #pin-input:focus { border-color: #a5b4fc; box-shadow: 0 0 20px rgba(165, 180, 252, 0.5); }
    .pin-actions { display: flex; gap: 15px; justify-content: center; }
    .pin-actions button { flex: 1; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: all 0.2s; border: none; font-size: 1.1rem; }
    #btn-pin-cancel { background: rgba(255,255,255,0.1); color: #cbd5e1; }
    #btn-pin-cancel:hover { background: rgba(255,255,255,0.2); }
    #btn-pin-submit { background: linear-gradient(135deg, #6366f1, #a855f7); color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); }
    #btn-pin-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6); }
    .pin-error { color: #fca5a5; min-height: 24px; margin-bottom: 15px; font-size: 1rem; font-weight: bold; }
    /* Hide the old tab bar completely */
    #tab-bar { display: none !important; }
  </style>
  
</head>
<body>
  <!-- NEW GORGEOUS NEON TOGGLE CORNER -->
  <div class="neon-toggle-container">
    <!-- Magic logic: Only one shows at a time based on which tab is 'active' in app.js -->
    <button id="tab-student" class="neon-toggle active">← Back to Game</button>
    <button id="tab-teacher" class="neon-toggle">Teacher Login 🔐</button>
  </div>
  <div id="app">
    <h1 id="app-title">Activity Arcade</h1>
    <!-- Student Panel -->
    <div id="panel-student">
      <!-- Name Entry -->
      <div id="screen-name" class="screen active">
        <div class="card center-card" id="name-section">
          <p class="subtitle">Enter your name to get started.</p>
          <div class="form-group">
            <input id="input-name" type="text" placeholder="First name" autocomplete="off" />
          </div>
          <button id="btn-start" class="btn btn-primary">Start</button>
        </div>
      </div>
      <!-- Loading -->
      <div id="screen-loading" class="screen">
        <div class="card center-card">
          <div class="spinner" aria-label="Loading"></div>
          <p class="subtitle loading-text">Loading activities…</p>
        </div>
      </div>
      <!-- Library -->
      <div id="screen-library" class="screen">
        <div class="card">
          <h2 class="section-heading">Choose an Activity</h2>
          <div id="library-list" class="library-list"></div>
        </div>
      </div>
      <!-- Activity Screen -->
      <div id="screen-activity" class="screen">
        <div class="card">
          <div class="activity-header">
            <h2 id="activity-title" class="section-heading">Activity Title</h2>
            <button id="btn-library" class="btn btn-ghost btn-sm">← All activities</button>
          </div>
          <p class="instruction" id="game-instructions"></p>
                    <!-- Side-by-side Workspace -->
          <div class="workspace">
            <div class="panel-left">
              <h3>Choices</h3>
              <div id="choice-pool" class="pool"></div>
            </div>
            <div class="panel-right">
              <h3>Paragraph Labels</h3>
              <div id="drop-zone" class="pool drop-zone-slots"></div>
            </div>
          </div>
          <div class="activity-footer">
            <button id="btn-check" class="btn primary">Check Answer</button>
            <button id="btn-retry" class="btn secondary" style="display:none;">Retry</button>
            <div id="feedback" class="feedback"></div>
          </div>
        </div>
      </div>
      <!-- Error Screen -->
      <div id="screen-error" class="screen">
        <div class="card center-card">
          <h2 style="color: #e74c3c;">Oops!</h2>
          <p id="error-message">Something went wrong.</p>
          <button onclick="location.reload()" class="btn btn-primary" style="margin-top: 15px;">Refresh Page</button>
        </div>
      </div>
    </div>
    <!-- Teacher Panel -->
    <div id="panel-teacher" class="hidden">
      <div class="card">
        <div class="teacher-header">
          <h2>Teacher Dashboard</h2>
          <a href="PASTE_YOUR_GOOGLE_SHEET_URL_HERE" target="_blank" class="btn btn-sm" style="background: linear-gradient(to right, #8b5cf6, #ec4899) !important; color: white !important; border: none !important; text-decoration: none; display: flex; align-items: center;">Edit Activities Sheet</a>
          <button id="btn-reset-session" class="btn btn-secondary btn-sm">Refresh Current Session</button>
        </div>
        <div id="teacher-results" class="results-container">
          <p>Loading results...</p>
        </div>
      </div>
    </div>
  </div>
  <!-- GORGEOUS NEON PIN MODAL -->
  <div id="pin-modal" class="hidden">
    <div id="pin-modal-box">
      <h3>Teacher Access</h3>
      <p>Enter your PIN to continue.</p>
      <input id="pin-input" type="password" inputmode="numeric" maxlength="6" placeholder="••••••" />
      <p id="pin-error" class="pin-error" role="alert" aria-live="polite"></p>
      <div class="pin-actions">
        <button id="btn-pin-cancel">Cancel</button>
        <button id="btn-pin-submit">Enter</button>
      </div>
    </div>
  </div>
  <script src="app.js?v=123"></script>
</body>
</html>
